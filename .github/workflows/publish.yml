name: publish

# GitHub Release 발행 시 PyPI 로 빌드·배포.
# 인증: repo Secret PYPI_API_TOKEN (plateerlab 계정 토큰) — 조직 멤버 누구나 Release 만 발행하면 배포됨.
#   (개인 토큰 불필요. 트러스티드 퍼블리싱으로 바꾸려면 id-token:write + environment 추가.)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pip install twine && python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
